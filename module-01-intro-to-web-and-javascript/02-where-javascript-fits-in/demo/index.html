<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where JavaScript Fits In — Demo</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 60px auto;
            text-align: center;
            color: #333;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            margin-bottom: 32px;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1 id="main-heading">Hello from HTML</h1>
    <p>This page was built with HTML and CSS only. Try clicking the button.</p>
    <button id="change-btn">Change the Heading</button>

    <!-- Step 1: Comment this out first, then uncomment to show the difference -->
    <script src="script.js"></script>

</body>
</html>
